<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenKrab | High-Performance AI Gateway</title>
  <meta name="description"
    content="OpenKrab is a personal AI assistant in Rust with multi-channel gateway. Connect Telegram, Slack, Discord, WhatsApp, Signal, iMessage and more to your AI.">
  <meta name="keywords"
    content="AI assistant, Rust, Telegram, Slack, Discord, WhatsApp, Signal, iMessage, chatbot, gateway">
  <meta name="author" content="OpenKrab">
  <meta property="og:title" content="OpenKrab Documentation">
  <meta property="og:description" content="Personal AI assistant in Rust with multi-channel gateway">
  <meta property="og:type" content="website">
  <link rel="icon" type="image/png" href="assets/logo/logo-face-Photoroom.png">
  <!-- Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" id="prism-theme"
    href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/15.0.7/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-rust.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-toml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
    mermaid.initialize({
      startOnLoad: false,
      theme: 'dark',
      themeVariables: {
        primaryColor: '#FF5A36',
        primaryTextColor: '#fff',
        primaryBorderColor: '#FF5A36',
        lineColor: '#94a3b8',
        secondaryColor: '#0f172a',
        tertiaryColor: '#1e293b'
      }
    });
    window.mermaid = mermaid;
  </script>

  <style>
    :root {
      --primary: #FF5A36;
      --primary-rgb: 255, 90, 54;
      --secondary: #FF8A6B;
      --bg-deep: #020617;
      --bg-card: #0f172a;
      --bg-sidebar: #020617;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border: #1e293b;
      --selection: rgba(255, 90, 54, 0.3);
      --glass: rgba(15, 23, 42, 0.8);
      --sidebar-width: 300px;
    }

    [data-theme="light"] {
      --primary: #FF5A36;
      --primary-rgb: 255, 90, 54;
      --secondary: #FF8A6B;
      --bg-deep: #f8fafc;
      --bg-card: #ffffff;
      --bg-sidebar: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --selection: rgba(255, 90, 54, 0.2);
      --glass: rgba(255, 255, 255, 0.8);
    }

    [data-theme="light"] .logo-box span {
      background: linear-gradient(135deg, #0f172a 0%, #64748b 100%);
      -webkit-background-clip: text;
      background-clip: text;
    }

    [data-theme="light"] h1,
    [data-theme="light"] h2,
    [data-theme="light"] h3,
    [data-theme="light"] h4 {
      color: #0f172a;
    }

    [data-theme="light"] body {
      background-color: var(--bg-deep);
    }

    [data-theme="light"] code {
      background: rgba(15, 23, 42, 0.08);
      color: #ea580c;
      border-color: #e2e8f0;
    }

    [data-theme="light"] pre {
      background: #f1f5f9 !important;
      border-color: #e2e8f0 !important;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    [data-theme="light"] pre code {
      color: #0f172a;
    }

    [data-theme="light"] ::-webkit-scrollbar-track {
      background: #f1f5f9;
    }

    [data-theme="light"] ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
    }

    [data-theme="light"] .search-modal {
      background: rgba(248, 250, 252, 0.95);
    }

    [data-theme="light"] blockquote {
      background: linear-gradient(to right, rgba(255, 90, 54, 0.08), transparent);
      color: #0f172a;
    }

    [data-theme="light"] .nav-item:hover {
      background: rgba(0, 0, 0, 0.03);
    }

    [data-theme="light"] .tab-item:hover {
      background: rgba(0, 0, 0, 0.05);
    }

    [data-theme="light"] .search-bar {
      background: rgba(0, 0, 0, 0.04);
      border-color: #e2e8f0;
    }

    [data-theme="light"] .search-bar:hover,
    [data-theme="light"] .search-bar.active {
      background: rgba(0, 0, 0, 0.06);
    }

    [data-theme="light"] .step-number {
      background: var(--bg-card);
      border-color: var(--primary);
      color: var(--primary);
    }

    [data-theme="light"] .search-shortcut {
      background: #f1f5f9;
    }

    [data-theme="light"] .kbd {
      background: #f1f5f9;
      border-color: #e2e8f0;
    }

    [data-theme="light"] header {
      background: var(--glass);
      border-color: #e2e8f0;
    }

    [data-theme="light"] #sidebar {
      border-color: #e2e8f0;
    }

    [data-theme="light"] .logo-box span {
      background: linear-gradient(135deg, #0f172a 0%, #64748b 100%);
      -webkit-background-clip: text;
      background-clip: text;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    ::selection {
      background: var(--selection);
      color: #fff;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-deep);
      color: var(--text-main);
      line-height: 1.7;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* --- Custom Scrollbar --- */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-deep);
    }

    ::-webkit-scrollbar-thumb {
      background: #1e293b;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--primary);
    }

    /* --- Header --- */
    header {
      position: fixed;
      top: 0;
      right: 0;
      left: var(--sidebar-width);
      height: 64px;
      background: var(--glass);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 1rem;
      overflow-x: auto;
      flex: 1;
    }

    .nav-tabs {
      display: flex;
      gap: 0.5rem;
      margin-right: 1rem;
    }

    .tab-item {
      padding: 6px 12px;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 6px;
      white-space: nowrap;
      transition: 0.2s;
    }

    .tab-item:hover {
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.05);
    }

    .tab-item.active {
      color: var(--primary);
      background: rgba(var(--primary-rgb), 0.1);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .header-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    .header-links a:hover {
      color: var(--primary);
    }

    .search-container {
      position: relative;
    }

    .search-bar {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      width: 240px;
      color: var(--text-main);
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
      cursor: pointer;
    }

    .search-bar:hover,
    .search-bar.active {
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.08);
    }

    .search-bar input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-main);
      font-size: 0.85rem;
      width: 100%;
    }

    .search-bar input::placeholder {
      color: var(--text-muted);
    }

    /* Search Modal */
    .search-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(2, 6, 23, 0.9);
      backdrop-filter: blur(10px);
      z-index: 10001;
      justify-content: center;
      align-items: flex-start;
      padding-top: 100px;
    }

    .search-modal.active {
      display: flex;
    }

    .search-box {
      width: 600px;
      max-width: 90vw;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .search-input-wrapper {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }

    .search-input-wrapper svg {
      color: var(--text-muted);
    }

    .search-input-wrapper input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-main);
      font-size: 1rem;
    }

    .search-results {
      max-height: 400px;
      overflow-y: auto;
    }

    .search-result-item {
      padding: 12px 20px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.2s;
    }

    .search-result-item:hover,
    .search-result-item.active {
      background: rgba(var(--primary-rgb), 0.1);
    }

    .search-result-item:last-child {
      border-bottom: none;
    }

    .search-result-title {
      font-weight: 500;
      color: var(--text-main);
      margin-bottom: 4px;
    }

    .search-result-path {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .search-result-preview {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .search-shortcut {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      background: var(--bg-deep);
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .kbd {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
    }

    /* --- Sidebar --- */
    #sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: var(--sidebar-width);
      height: 100vh;
      background-color: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      padding: 2.5rem 2rem;
      overflow-y: auto;
      z-index: 1000;
    }

    .logo-box {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 3rem;
      text-decoration: none;
    }

    .logo-box span {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 1.4rem;
      letter-spacing: -0.02em;
      color: var(--text-main);
      background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo-img {
      height: 32px !important;
      width: auto;
      margin: 0 !important;
      border: none !important;
      border-radius: 0 !important;
      box-shadow: none !important;
    }

    .nav-group {
      margin-bottom: 2rem;
    }

    .nav-title {
      font-family: 'Outfit', sans-serif;
      font-size: 0.75rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #71717a;
      margin-bottom: 1rem;
      margin-top: 1.5rem;
    }

    .nav-item {
      display: block;
      padding: 6px 12px;
      font-size: 0.9rem;
      color: var(--text-muted);
      text-decoration: none;
      border-radius: 8px;
      margin-bottom: 2px;
      transition: all 0.2s;
      border: 1px solid transparent;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .nav-item:hover {
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.03);
    }

    .nav-item.active {
      color: var(--primary);
      background: rgba(var(--primary-rgb), 0.1);
      border-color: rgba(var(--primary-rgb), 0.15);
      font-weight: 500;
    }

    /* --- Content Area --- */
    main {
      margin-left: var(--sidebar-width);
      padding: 100px 10% 80px 10%;
      min-height: 100vh;
      max-width: 1400px;
    }

    #doc-content {
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #doc-content.visible {
      opacity: 1;
    }

    /* --- Markdown Styling --- */
    h1,
    h2,
    h3,
    h4 {
      font-family: 'Outfit', sans-serif;
      margin-bottom: 1.5rem;
      color: #fff;
      font-weight: 600;
    }

    h1 {
      font-size: 3rem;
      letter-spacing: -0.04em;
      margin-bottom: 2.5rem;
    }

    h2 {
      font-size: 2rem;
      margin-top: 4rem;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      letter-spacing: -0.02em;
    }

    h3 {
      font-size: 1.5rem;
      margin-top: 3rem;
    }

    p {
      margin-bottom: 1.5rem;
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    code {
      font-family: 'JetBrains Mono', monospace;
      background: rgba(30, 41, 59, 0.5);
      color: var(--secondary);
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 0.9rem;
      border: 1px solid var(--border);
    }

    pre {
      background: #0b0f19 !important;
      padding: 2rem !important;
      border-radius: 16px !important;
      border: 1px solid var(--border) !important;
      margin: 2rem 0;
      overflow-x: auto;
      box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
    }

    pre code {
      background: none;
      border: none;
      padding: 0;
      color: #e2e8f0;
    }

    ul,
    ol {
      margin: 0 0 1.5rem 1.5rem;
      color: var(--text-muted);
    }

    li {
      margin-bottom: 0.75rem;
    }

    blockquote {
      background: linear-gradient(to right, rgba(var(--primary-rgb), 0.05), transparent);
      border-left: 4px solid var(--primary);
      padding: 1.5rem 2rem;
      border-radius: 0 12px 12px 0;
      margin: 2.5rem 0;
      font-style: italic;
      color: var(--text-main);
    }

    a.text-link {
      color: var(--primary);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: 0.2s;
    }

    a.text-link:hover {
      border-bottom-color: var(--primary);
    }

    img {
      max-width: 100%;
      border-radius: 12px;
      margin: 3rem 0;
    }

    /* --- Mintlify Components Fixes --- */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
      margin: 3rem 0;
    }

    .doc-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2rem;
      text-decoration: none !important;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: block;
      height: 100%;
    }

    .doc-card:hover {
      transform: translateY(-8px);
      border-color: var(--primary);
      box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6), 0 0 20px rgba(var(--primary-rgb), 0.1);
    }

    .doc-card h4 {
      margin-bottom: 0.75rem;
      color: var(--primary);
      font-size: 1.25rem;
      font-weight: 700;
    }

    .doc-card p {
      font-size: 0.95rem;
      margin-bottom: 0;
      color: var(--text-muted);
      line-height: 1.6;
    }

    /* --- Steps --- */
    .steps-container {
      margin: 3rem 0;
      border-left: 1px solid var(--border);
      padding-left: 2rem;
      margin-left: 1rem;
    }

    .doc-step {
      position: relative;
      margin-bottom: 3rem;
    }

    .step-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
      margin-left: -2.85rem;
    }

    .step-number {
      width: 28px;
      height: 28px;
      background: var(--bg-deep);
      border: 1px solid var(--primary);
      color: var(--primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
      z-index: 2;
    }

    .step-header h5 {
      margin-top: 2rem;
      margin-bottom: 0;
      font-size: 1.1rem;
      color: var(--text-main);
    }

    .step-body p {
      font-size: 1rem;
    }

    /* --- Tables --- */
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 2rem 0;
      font-size: 0.95rem;
    }

    th,
    td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    th {
      background: var(--bg-card);
      color: var(--text-main);
      font-weight: 600;
    }

    tr:hover {
      background: rgba(255, 255, 255, 0.02);
    }

    /* --- Back to Top Button --- */
    .back-to-top {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      width: 44px;
      height: 44px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.3s;
      z-index: 99;
      color: var(--text-muted);
    }

    .back-to-top.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .back-to-top:hover {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    /* --- Transitions --- */
    #loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 4px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      z-index: 10000;
      animation: pulse 2s infinite;
      display: none;
    }

    @keyframes pulse {
      0% {
        transform: translateX(-100%);
      }

      100% {
        transform: translateX(100%);
      }
    }

    /* Mobile Menu */
    .mobile-menu-btn {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 8px;
      margin-right: 1rem;
    }

    .mobile-menu-btn span {
      display: block;
      width: 20px;
      height: 2px;
      background: var(--text-main);
      transition: 0.3s;
    }

    .mobile-menu-btn.active span:nth-child(1) {
      transform: rotate(45deg) translate(5px, 5px);
    }

    .mobile-menu-btn.active span:nth-child(2) {
      opacity: 0;
    }

    .mobile-menu-btn.active span:nth-child(3) {
      transform: rotate(-45deg) translate(5px, -5px);
    }

    #sidebar.mobile-open {
      width: var(--sidebar-width);
      display: block;
      z-index: 1001;
      box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
    }

    .sidebar-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
    }

    .sidebar-overlay.active {
      display: block;
    }

    @media (max-width: 1000px) {
      #sidebar {
        width: 0;
        display: none;
      }

      header {
        left: 0;
        padding: 0 1.5rem;
      }

      main {
        margin-left: 0;
        padding: 100px 5% 40px 5%;
      }

      .search-bar {
        width: auto;
        padding: 8px;
      }

      .search-bar span:not(:first-child) {
        display: none;
      }

      .mobile-menu-btn {
        display: flex;
      }

      .header-links {
        display: none;
      }

      h1 {
        font-size: 2rem;
      }

      h2 {
        font-size: 1.5rem;
      }

      .card-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 600px) {
      .nav-tabs {
        display: none;
      }

      main {
        padding: 80px 4% 40px 4%;
      }

      pre {
        padding: 1rem !important;
      }
    }

    /* Theme Toggle */
    .theme-toggle {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      cursor: pointer;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .theme-toggle:hover {
      color: var(--primary);
      border-color: var(--primary);
    }

    .theme-toggle .icon-moon {
      display: none;
    }

    [data-theme="light"] .theme-toggle .icon-sun {
      display: none;
    }

    [data-theme="light"] .theme-toggle .icon-moon {
      display: block;
    }
  </style>
</head>

<body>

  <div id="loader"></div>

  <!-- Search Modal -->
  <div id="search-modal" class="search-modal">
    <div class="search-box">
      <div class="search-input-wrapper">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="search-input" placeholder="Search documentation..." autocomplete="off">
      </div>
      <div id="search-results" class="search-results"></div>
      <div class="search-shortcut">
        <span>Press <span class="kbd">ESC</span> to close</span>
        <span style="margin-left: auto;"><span class="kbd">↑</span> <span class="kbd">↓</span> to navigate</span>
      </div>
    </div>
  </div>

  <aside id="sidebar">
    <a href="#/index" class="logo-box">
      <img src="assets/logo/logo-face-Photoroom.png" alt="OpenKrab Logo" class="logo-img">
      <span>OpenKrab</span>
    </a>
    <div id="nav-container"></div>
  </aside>

  <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleMobileMenu()"></div>

  <header>
    <div class="header-left">
      <div class="mobile-menu-btn" id="mobile-menu-btn" onclick="toggleMobileMenu()">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div id="tabs-container" class="nav-tabs"></div>
    </div>
    <div class="header-right">
      <div class="search-container">
        <div class="search-bar" id="search-trigger" onclick="openSearch()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <span style="color: var(--text-muted);">Search...</span>
          <span style="margin-left: auto; display: flex; gap: 4px;">
            <span
              style="background: var(--bg-card); border: 1px solid var(--border); border-radius: 4px; padding: 2px 6px; font-size: 0.7rem;">Ctrl</span>
            <span
              style="background: var(--bg-card); border: 1px solid var(--border); border-radius: 4px; padding: 2px 6px; font-size: 0.7rem;">K</span>
          </span>
        </div>
      </div>
      <div class="header-links">
        <a href="https://github.com/openkrab/openkrab" target="_blank">GitHub</a>
      </div>
      <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
        <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>
    </div>
  </header>

  <main>
    <div id="doc-content"></div>
  </main>

  <button class="back-to-top" id="back-to-top" onclick="scrollToTop()" title="Back to top">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="18 15 12 9 6 15"></polyline>
    </svg>
  </button>

  <script>
    // Theme management
    function getTheme() {
      return localStorage.getItem('theme') || 'dark';
    }

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);

      // Update Prism theme
      const prismLink = document.getElementById('prism-theme');
      if (prismLink) {
        prismLink.href = theme === 'light'
          ? 'https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css'
          : 'https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css';
      }
    }

    function toggleTheme() {
      const current = getTheme();
      setTheme(current === 'dark' ? 'light' : 'dark');
    }

    // Initialize theme on load
    (function () {
      const savedTheme = getTheme();
      setTheme(savedTheme);
    })();

    const contentBox = document.getElementById('doc-content');
    const navBox = document.getElementById('nav-container');
    const loader = document.getElementById('loader');

    // Configure Marked
    if (typeof marked !== 'undefined') {
      marked.setOptions({
        gfm: true,
        breaks: true,
        headerIds: true,
        highlight: function (code, lang) {
          if (Prism.languages[lang]) {
            return Prism.highlight(code, Prism.languages[lang], lang);
          }
          return code;
        }
      });
    }

    let currentConfig = null;
    let activeTabIdx = 0;
    let searchIndex = [];
    let activeSearchIdx = -1;

    // Search functionality
    function openSearch() {
      document.getElementById('search-modal').classList.add('active');
      document.getElementById('search-input').focus();
      document.getElementById('search-input').value = '';
      document.getElementById('search-results').innerHTML = '';
      activeSearchIdx = -1;
      buildSearchIndex();
    }

    function closeSearch() {
      document.getElementById('search-modal').classList.remove('active');
    }

    function buildSearchIndex() {
      if (searchIndex.length > 0) return;

      // Build index from navigation
      currentConfig.navigation.languages[0].tabs.forEach(tab => {
        tab.groups.forEach(group => {
          group.pages.forEach(page => {
            if (typeof page === 'string') {
              const parts = page.split('/');
              const name = parts[parts.length - 1].replace(/-/g, ' ');
              const category = parts[0];
              searchIndex.push({
                path: page,
                title: name.charAt(0).toUpperCase() + name.slice(1),
                category: category.charAt(0).toUpperCase() + category.slice(1),
                group: group.group
              });
            }
          });
        });
      });
    }

    function performSearch(query) {
      if (!query.trim()) {
        document.getElementById('search-results').innerHTML = '';
        return;
      }

      const q = query.toLowerCase();
      const results = searchIndex.filter(item =>
        item.title.toLowerCase().includes(q) ||
        item.category.toLowerCase().includes(q) ||
        item.group.toLowerCase().includes(q)
      ).slice(0, 8);

      const html = results.map((r, idx) => `
        <div class="search-result-item ${idx === activeSearchIdx ? 'active' : ''}"
             data-path="${r.path}"
             data-idx="${idx}"
             onclick="navigateTo('${r.path}')">
          <div class="search-result-title">${r.title}</div>
          <div class="search-result-path">${r.category} > ${r.group}</div>
        </div>
      `).join('');

      document.getElementById('search-results').innerHTML = html || `
        <div class="search-result-item" style="cursor: default;">
          <div class="search-result-title" style="color: var(--text-muted);">No results found</div>
        </div>
      `;
    }

    function navigateTo(path) {
      window.location.hash = `#/${path}`;
      closeSearch();
    }

    // Search event listeners
    document.addEventListener('keydown', (e) => {
      // Ctrl+K or Cmd+K to open search
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        openSearch();
      }
      // Escape to close
      if (e.key === 'Escape') {
        closeSearch();
      }
      // Arrow navigation in search
      if (document.getElementById('search-modal').classList.contains('active')) {
        const results = document.querySelectorAll('.search-result-item[data-path]');
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          activeSearchIdx = Math.min(activeSearchIdx + 1, results.length - 1);
          updateSearchSelection();
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          activeSearchIdx = Math.max(activeSearchIdx - 1, 0);
          updateSearchSelection();
        } else if (e.key === 'Enter' && activeSearchIdx >= 0) {
          e.preventDefault();
          const active = results[activeSearchIdx];
          if (active) navigateTo(active.dataset.path);
        }
      }
    });

    function updateSearchSelection() {
      document.querySelectorAll('.search-result-item').forEach((el, idx) => {
        el.classList.toggle('active', idx === activeSearchIdx);
      });
    }

    document.getElementById('search-input')?.addEventListener('input', (e) => {
      performSearch(e.target.value);
    });

    // Close search when clicking outside
    document.getElementById('search-modal')?.addEventListener('click', (e) => {
      if (e.target.id === 'search-modal') closeSearch();
    });

    async function init() {
      try {
        const res = await fetch('docs.json');
        currentConfig = await res.json();
        renderTabs();
        renderSidebar();
        handleRoute();
      } catch (e) {
        contentBox.innerHTML = `<h1>System Error</h1><p>Documentation index (docs.json) not found.</p>`;
      }
    }

    // Mobile menu toggle
    function toggleMobileMenu() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebar-overlay');
      const btn = document.getElementById('mobile-menu-btn');

      sidebar.classList.toggle('mobile-open');
      overlay.classList.toggle('active');
      btn.classList.toggle('active');
    }

    // Close mobile menu when clicking a nav item
    document.addEventListener('click', (e) => {
      if (e.target.classList?.contains('nav-item')) {
        const sidebar = document.getElementById('sidebar');
        if (sidebar.classList.contains('mobile-open')) {
          toggleMobileMenu();
        }
      }
    });

    function renderTabs() {
      const tabs = currentConfig.navigation.languages[0].tabs;
      const container = document.getElementById('tabs-container');
      container.innerHTML = tabs.map((t, idx) => `
        <div class="tab-item ${idx === activeTabIdx ? 'active' : ''}" onclick="switchTab(${idx})">
          ${t.tab}
        </div>
      `).join('');
    }

    function switchTab(idx) {
      activeTabIdx = idx;
      renderTabs();
      renderSidebar();

      // Auto-navigate to the first page of the new tab if not already on a page in that tab
      const firstGroup = currentConfig.navigation.languages[0].tabs[idx].groups[0];
      if (firstGroup) {
        const firstPage = firstGroup.pages[0];
        const path = typeof firstPage === 'string' ? firstPage : firstPage.pages[0];
        if (typeof path === 'string') {
          window.location.hash = `#/${path}`;
        }
      }
    }

    function renderSidebar() {
      const tab = currentConfig.navigation.languages[0].tabs[activeTabIdx];
      let html = '';

      function renderRecursive(groups) {
        groups.forEach(group => {
          html += `<div class="nav-group">`;
          if (group.group) html += `<div class="nav-title">${group.group}</div>`;

          group.pages.forEach(page => {
            if (typeof page === 'string') {
              const name = page.split('/').pop().replace(/-/g, ' ');
              html += `<a href="#/${page}" class="nav-item" data-path="${page}">${name}</a>`;
            } else if (page.group && page.pages) {
              // Subgroup
              html += `<div style="padding-left: 10px; border-left: 1px solid var(--border); margin-left: 12px; margin-top: 5px;">`;
              html += `<div class="nav-title" style="margin-top: 10px; font-size: 0.7rem;">${page.group}</div>`;
              page.pages.forEach(sub => {
                const subPath = typeof sub === 'string' ? sub : sub.group;
                const subName = subPath.split('/').pop().replace(/-/g, ' ');
                html += `<a href="#/${subPath}" class="nav-item" data-path="${subPath}">${subName}</a>`;
              });
              html += `</div>`;
            }
          });
          html += `</div>`;
        });
      }

      renderRecursive(tab.groups);
      navBox.innerHTML = html;

      // Sync active state immediately
      const currentPath = (window.location.hash || '#/index').substring(2).replace(/^\//, '');
      document.querySelectorAll('.nav-item').forEach(el => {
        el.classList.toggle('active', el.getAttribute('data-path') === currentPath);
      });
    }

    async function loadPage(path) {
      loader.style.display = 'block';
      contentBox.classList.remove('visible');

      const cleanPath = path.replace(/^\//, '');
      // When deployed, we'll ensure 'docs' is a subfolder of the root
      const target = cleanPath.endsWith('.md') ? `docs/${cleanPath}` : `docs/${cleanPath}.md`;

      try {
        const res = await fetch(target);
        if (!res.ok) throw new Error();
        let raw = await res.text();

        // 1. Remove Frontmatter
        raw = raw.replace(/^---[\s\S]*?---/, '');

        // 2. Prep Placeholders
        const placeholders = [];

        // 3. Fix Hero Section (Extract to placeholder to prevent code block rendering)
        const heroRegex = /<p align="center">[\s\S]*?<img[^>]+openkrab-logo-text[\s\S]*?<\/p>/;
        if (heroRegex.test(raw)) {
          raw = raw.replace(heroRegex, ''); // Remove the hero section entirely
        }

        // 4. Fix General Image Paths (Exclude our official logo folder)
        raw = raw.replace(/src="(\/)?assets\/(?!logo\/)([^"]+)"/g, (m, s, p) => `src="docs/assets/${p}"`);
        raw = raw.replace(/!\[(.*?)\]\((\/)?assets\/(?!logo\/)([^"]+)\)/g, (m, alt, s, p) => `![${alt}](docs/assets/${p})`);

        // 5. Extract Custom Components
        // Handle Columns & Cards together to maintain structure
        raw = raw.replace(/<Columns>([\s\S]*?)<\/Columns>/g, (match, content) => {
          const id = `%%COLUMNS_${placeholders.length}%%`;

          // Render the inner cards first
          let renderedContent = content.replace(/<Card\s+([^>]+)>([\s\S]*?)<\/Card>/g, (m, attrs, body) => {
            const title = (attrs.match(/title="([^"]+)"/) || [])[1] || 'Docs';
            const href = (attrs.match(/href="([^"]+)"/) || [])[1] || '#';
            const cleanBody = body.trim();
            return `
                <a href="#${href}" class="doc-card">
                    <h4>${title}</h4>
                    <p>${cleanBody}</p>
                </a>`;
          });

          placeholders.push({
            id: id,
            html: `<div class="card-grid">${renderedContent}</div>`
          });
          return id;
        });

        // Handle standalone cards
        raw = raw.replace(/<Card\s+([^>]+)>([\s\S]*?)<\/Card>/g, (m, attrs, body) => {
          const id = `%%CARD_${placeholders.length}%%`;
          const title = (attrs.match(/title="([^"]+)"/) || [])[1] || 'Docs';
          const href = (attrs.match(/href="([^"]+)"/) || [])[1] || '#';
          placeholders.push({
            id: id,
            html: `<a href="#${href}" class="doc-card"><h4>${title}</h4><p>${body.trim()}</p></a>`
          });
          return id;
        });

        // Handle Steps & Step
        raw = raw.replace(/<Steps>([\s\S]*?)<\/Steps>/g, (match, content) => {
          const id = `%%STEPS_${placeholders.length}%%`;
          let stepIndex = 1;
          let renderedContent = content.replace(/<Step\s+title="([^"]+)">([\s\S]*?)<\/Step>/g, (m, title, body) => {
            return `
                <div class="doc-step">
                    <div class="step-header">
                        <span class="step-number">${stepIndex++}</span>
                        <h5>${title}</h5>
                    </div>
                    <div class="step-body">${marked.parse(body.trim())}</div>
                </div>`;
          });

          placeholders.push({
            id: id,
            html: `<div class="steps-container">${renderedContent}</div>`
          });
          return id;
        });

        // 3. Final Render and Re-insertion
        let html = marked.parse(raw);

        // Strip leftover Mintlify tags
        html = html.replace(/<\/?(Note|Warning|Info|Tip)[^>]*>/g, '');

        // Re-insert components
        placeholders.forEach(p => {
          const wrap = `<p>${p.id}</p>`;
          if (html.includes(wrap)) {
            html = html.split(wrap).join(p.html);
          } else {
            html = html.split(p.id).join(p.html);
          }
        });

        contentBox.innerHTML = html;

        // 5. Handle Mermaid Diagrams
        const mermaidBlocks = contentBox.querySelectorAll('code.language-mermaid');
        mermaidBlocks.forEach(block => {
          const pre = block.parentElement;
          const div = document.createElement('div');
          div.className = 'mermaid';
          div.textContent = block.textContent;
          pre.replaceWith(div);
        });
        if (mermaidBlocks.length > 0 && window.mermaid) {
          await window.mermaid.run();
        }

        // Highlight links
        document.querySelectorAll('#doc-content a').forEach(a => a.classList.add('text-link'));
        contentBox.querySelectorAll('a.doc-card').forEach(a => a.classList.remove('text-link'));

        // Sync Nav
        document.querySelectorAll('.nav-item').forEach(el => {
          el.classList.toggle('active', el.getAttribute('data-path') === cleanPath);
        });

        contentBox.classList.add('visible');
        Prism.highlightAllUnder(contentBox);
        window.scrollTo(0, 0);

        // Update page title
        const h1 = contentBox.querySelector('h1');
        if (h1) {
          document.title = `${h1.textContent} | OpenKrab Docs`;
        } else {
          const pathName = cleanPath.split('/').pop().replace(/-/g, ' ');
          document.title = `${pathName.charAt(0).toUpperCase() + pathName.slice(1)} | OpenKrab Docs`;
        }

        // Smooth scroll for anchor links
        document.querySelectorAll('#doc-content a[href^="#"]').forEach(anchor => {
          anchor.addEventListener('click', function (e) {
            const href = this.getAttribute('href');
            if (href.length > 1) {
              const target = document.querySelector(href);
              if (target) {
                e.preventDefault();
                target.scrollIntoView({ behavior: 'smooth' });
              }
            }
          });
        });

        // Add anchor links to headers
        contentBox.querySelectorAll('h2, h3').forEach(header => {
          if (header.id) {
            const anchor = document.createElement('a');
            anchor.href = `#${header.id}`;
            anchor.className = 'header-anchor';
            anchor.innerHTML = '#'
            anchor.style.cssText = 'margin-left: 0.5rem; color: var(--text-muted); text-decoration: none; opacity: 0; transition: opacity 0.2s;';
            header.appendChild(anchor);
            header.addEventListener('mouseenter', () => anchor.style.opacity = '1');
            header.addEventListener('mouseleave', () => anchor.style.opacity = '0');
          }
        });
      } catch (e) {
        contentBox.innerHTML = `<h1>404 | Page Not Found</h1><p>We couldn't find the requested page: <code>${path}</code></p>`;
        contentBox.classList.add('visible');
      } finally {
        loader.style.display = 'none';
      }
    }

    function handleRoute() {
      const hash = window.location.hash || '#/index';
      loadPage(hash.substring(2));
    }

    // Back to top functionality
    function scrollToTop() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    window.addEventListener('scroll', () => {
      const btn = document.getElementById('back-to-top');
      if (window.scrollY > 300) {
        btn.classList.add('visible');
      } else {
        btn.classList.remove('visible');
      }
    });

    // Keyboard shortcut for search
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        openSearch();
      }
    });

    window.addEventListener('hashchange', handleRoute);
    init();
  </script>

</body>

</html>
